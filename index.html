<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>

    <script src="script.ts"></script>
    <script type="module" src="src/main.ts"></script>
  </head>
  <body>
    <section class="screen home d-none">
      <div class="home-title">
        <p class="home-title home-title__subtitle">It's play time.</p>
        <p class="home-title home-title__title">Ready to play?</p>
      </div>
      <button class="start-btn">
        <img
          src="public/assets/img/stadia_controller.svg"
          alt="video game controller"
          class="start-btn start-btn__img start-btn__img--controller"
        />
        <span class="start-btn start-btn__text">Play</span>
        <img
          src="public/assets/img/home_arrow_right.svg"
          alt="Arrow to right"
          class="start-btn start-btn__img start-btn__img--arrow"
        />
      </button>
      <img
        src="public/assets/img/controller_bg.svg"
        alt="controller background image"
        class="home__bg-img"
      />
    </section>
    <section class="screen settings d-none">
      <div>
        <div class="h1-wrap">
          <h1>Settings</h1>
          <div class="h1-underline"></div>
        </div>
        <div class="set-body">
          <div class="set-menu-wrap">
            <div class="set-collection">
              <h2>
                <img
                  src="./public/assets/img/palette.svg"
                  alt="painter's palette"
                />
                <span>Game themes</span>
              </h2>
              <div class="menu-options">
                <button
                  class="menu-options__btn"
                  onclick="
                    setGameTheme('Code-vibes');
                    setListDecorators(this);
                  "
                  onmouseenter="setThemePreview('Code-vibes')"
                  onmouseout="setThemePreview(gameTheme)"
                >
                  <span class="set-point"></span>
                  <span>Code vibes theme</span>
                  <div class="set-deco"></div>
                </button>
                <button
                  class="menu-options__btn"
                  onclick="
                    setGameTheme('DA-projects');
                    setListDecorators(this);
                  "
                  onmouseenter="setThemePreview('DA-projects')"
                  onmouseout="setThemePreview(gameTheme)"
                >
                  <span class="set-point"></span>
                  <span>DA projects theme</span>
                  <div class="set-deco"></div>
                </button>
              </div>
            </div>
            <div class="set-collection">
              <h2>
                <img
                  src="./public/assets/img/chess_pawn.svg"
                  alt="chess token"
                />
                <span>Chose player</span>
              </h2>
              <div class="menu-options">
                <button
                  class="menu-options__btn"
                  onclick="
                    setStartPlayer('Blue');
                    setListDecorators(this);
                  "
                >
                  <span class="set-point"></span>
                  <span>Blue</span>
                  <div class="set-deco"></div>
                </button>
                <button
                  class="menu-options__btn"
                  onclick="
                    setStartPlayer('Orange');
                    setListDecorators(this);
                  "
                >
                  <span class="set-point"></span>
                  <span>Orange</span>
                  <div class="set-deco"></div>
                </button>
              </div>
            </div>
            <div class="set-collection">
              <h2>
                <img
                  src="./public/assets/img/card_deck.svg"
                  alt="deck of cards"
                />
                <span>Board size</span>
              </h2>
              <div class="menu-options">
                <button
                  class="menu-options__btn"
                  onclick="
                    setBoardSize('16');
                    setListDecorators(this);
                  "
                >
                  <span class="set-point"></span>
                  <span>16 cards</span>
                  <div class="set-deco"></div>
                </button>
                <button
                  class="menu-options__btn"
                  onclick="
                    setBoardSize('24');
                    setListDecorators(this);
                  "
                >
                  <span class="set-point"></span>
                  <span>24 cards</span>
                  <div class="set-deco"></div>
                </button>
                <button
                  class="menu-options__btn"
                  onclick="
                    setBoardSize('36');
                    setListDecorators(this);
                  "
                >
                  <span class="set-point"></span>
                  <span>36 cards</span>
                  <div class="set-deco"></div>
                </button>
              </div>
            </div>
          </div>
          <div class="set-selection">
            <img
              src="public/assets/img/preview_code_icons.svg"
              alt="card deck theme"
              class="set-selection set-selection__img"
              id="theme-preview"
            />
            <div class="set-panel">
              <span
                class="set-panel__text min-width-200px"
                id="game-theme-selected"
                >Game theme</span
              >
              <span class="set-panel__separator"></span>
              <span class="set-panel__text min-width-140px" id="player-selected"
                >Player</span
              >
              <span class="set-panel__separator"></span>
              <span
                class="set-panel__text min-width-120px"
                id="board-size-selected"
                >Board size</span
              >
              <button class="set-panel__btn disabled" id="set-start-btn">
                <img src="public/assets/img/play.svg" alt="play button" />
                <span>Start</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="screen game-screen">
      <div class="game">
        <div class="game-header">
          <div class="game-header__score">
            <div class="game-header__score--blue">
              <div class="player-icon player-icon--blue"></div>
              <span>Blue</span>
              <span>0</span>
            </div>
            <div class="game-header__score--orange">
              <div class="player-icon player-icon--orange"></div>
              <span>Orange</span>
              <span>6</span>
            </div>
          </div>
          <div class="game-header__current-player">
            <span>Current player:</span>
            <div class="player-icon player-icon--blue"></div>
          </div>
          <button class="game-header__exit-btn">
            <img src="public/assets/img/leave.svg" alt="exit icon" />
            <span>Exit game</span>
          </button>
        </div>
        <div class="game-core">
          <button class="card">
            <div class="card__inner">
              <div class="card__face card__face--front"></div>
              <div class="card__face card__face--back"></div>
            </div>
          </button>
        </div>
      </div>
      <div class="exit-overlay">
        <div class="exit-overlay__text">
          Are you sure you want to quit the game?
        </div>
        <div class="exit-overlay-btn-wrap">
          <button class="exit-overlay__btn exit-overlay__btn--primary">
            Back to game
          </button>
          <button class="exit-overlay__btn exit-overlay__btn--secondary">
            Exit game
          </button>
        </div>
      </div>
    </section>
    <section class="screen game-over d-none">
      <div>
        <div class="game-over__headline">Game over</div>
        <div class="game-over-score-wrap">
          <div>Final score</div>
          <div class="game-over__score">
            <div class="game-over__score--blue">
              <div class="player-icon player-icon--blue"></div>
              <span>Blue</span>
              <span>10</span>
            </div>
            <div class="game-over__score--orange">
              <div class="player-icon player-icon--orange"></div>
              <span>Orange</span>
              <span>16</span>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="screen winner d-none">
      <div>
        <img
          src="public/assets/img/confetti.svg"
          alt="confetti"
          class="confetti"
        />
        <div class="winner-content">
          <div class="winner-content__headline">
            <div class="winner-content__headline--secondary">The winner is</div>
            <div class="winner-content__headline--primary color-orange">
              Orange Player
            </div>
          </div>
          <img
            src="public/assets/img/chess_pawn_orange.svg"
            alt=""
            class="winner-content__img"
          />
          <button class="winner-content__btn">Back to the start</button>
        </div>
      </div>
    </section>
    <section class="screen winner d-none">
      <div>
        <img
          src="public/assets/img/confetti.svg"
          alt="confetti"
          class="confetti"
        />
        <div class="winner-content">
          <div class="winner-content__headline">
            <div class="winner-content__headline--secondary">The winner is</div>
            <div class="winner-content__headline--primary color-blue">
              Blue Player
            </div>
          </div>
          <img
            src="public/assets/img/chess_pawn_blue.svg"
            alt="orange chess pawn"
            class="winner-content__img"
          />
          <button class="winner-content__btn">Back to the start</button>
        </div>
      </div>
    </section>
    <section class="screen draw d-none">
      <div class="draw__headline">
        <div class="draw__headline--secondary">It's a</div>
        <div class="draw__headline--primary">Draw</div>
      </div>
      <img
        src="public/assets/img/scale_icon.svg"
        alt="equal scale"
        class="draw__img"
      />
      <button class="draw__btn">Back to the start</button>
    </section>
  </body>
</html>
