<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Memory</title>

    <script type="module" src="src/main.ts"></script>
  </head>
  <body>
    <section class="screen home">
      <div class="home-title">
        <p class="home-title home-title__subtitle">It's play time.</p>
        <p class="home-title home-title__title">Ready to play?</p>
      </div>
      <button class="start-btn">
        <img
          src="public/assets/img/stadia_controller.svg"
          alt="video game controller"
          class="start-btn start-btn__img start-btn__img--controller"
        />
        <span class="start-btn start-btn__text">Play</span>
        <img
          src="public/assets/img/home_arrow_right.svg"
          alt="Arrow to right"
          class="start-btn start-btn__img start-btn__img--arrow"
        />
      </button>
      <img
        src="public/assets/img/controller_bg.svg"
        alt="controller background image"
        class="home__bg-img"
      />
    </section>
    <section class="screen settings">
      <div>
        <h1>Settings</h1>
        <div class="set-body">
          <div class="set-menu-wrap">
            <div>
              <h2>
                <img
                  src="./public/assets/img/palette.svg"
                  alt="painter's palette"
                />
                <span>Game themes</span>
              </h2>
              <div class="menu-options">
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>Code vibes theme</span>
                  </button>
                </div>
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>DA projects theme</span>
                  </button>
                </div>
              </div>
            </div>
            <div>
              <h2>
                <img
                  src="./public/assets/img/chess_pawn.svg"
                  alt="chess token"
                />
                <span>Chose player</span>
              </h2>
              <div class="menu-options">
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>Blue</span>
                  </button>
                </div>
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>Orange</span>
                  </button>
                </div>
              </div>
            </div>
            <div>
              <h2>
                <img
                  src="./public/assets/img/card_deck.svg"
                  alt="deck of cards"
                />
                <span>Board size</span>
              </h2>
              <div class="menu-options">
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>16 cards</span>
                  </button>
                </div>
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>24 cards</span>
                  </button>
                </div>
                <div>
                  <button>
                    <img src="" alt="radial button" />
                    <span>36 cards</span>
                  </button>
                </div>
              </div>
            </div>
          </div>
          <div class="set-selection">
            <img
              src="public/assets/img/preview_code_icons.svg"
              alt="card deck theme"
              class="set-selection set-selection__img"
            />
            <div class="set-selection set-selection__panel">
              <span>Game theme</span>
              <span>Player</span>
              <span>Board size</span>
              <button>
                <img src="" alt="play button" />
                <span>Start</span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="screen game"></section>
    <section class="screen game-over"></section>
    <section class="screen winner-orange"></section>
    <section class="screen winner-blue"></section>
    <section class="screen draw"></section>
  </body>
</html>
